# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/family_command_center
spring.datasource.username=Kenneth
spring.datasource.password=adminPassword

# Connection pool settings (optional but recommended)
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10

# JPA (Java Persistence API) settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Logging SQL statements (for debugging)
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql=trace
